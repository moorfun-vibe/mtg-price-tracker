server {
    listen 80;
    server_name _;
    root /app;
    index index.html;

    # Dashboard
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Data snapshots
    location /data/ {
        alias /app/data/;
        add_header Cache-Control "public, max-age=3600";
        autoindex off;
    }

    # Cards config
    location /cards.json {
        add_header Cache-Control "public, max-age=300";
    }

    # Health check
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
